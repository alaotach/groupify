<!DOCTYPE html>
<html>
<head>
    <title>Tab Groups</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="popup-body">
    <div class="header">
        <span class="htitle">Tab Groups</span>
        <div class="hdr-actions">
            <button id="sBtn" class="icon-btn small-icn" title="Shortcuts">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                    <path d="M8 2a6 6 0 100 12A6 6 0 008 2z" stroke="currentColor" stroke-width="1.4"/>
                    <path d="M8 7v4m0-6h.01" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
            </button>
            <span class="groupBadge" id="groupCount">0 Groups</span>
        </div>
    </div>

    <div class="search-container" style="flex-shrink: 0; margin-bottom: 8px;">
        <input type="text" id="searchInput" class="cuntinput" placeholder="Search groups (/)" style="width: 100%; box-sizing: border-box; outline: none; border: 1px solid #e4e4e4; border-radius: 8px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 13.5px; background: #fafafa; color: #111;" autocomplete="off" />
    </div>

    <div class="scrollable" id="groups"></div>

    <div id="sPg" class="shortcuts-page" style="display: none;">
        <div class="header">
            <span class="htitle">Keyboard Shortcuts</span>
            <button id="cBtn" class="icon-btn small-icn">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                    <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="scrollable s-scroll">
            <div class="s-item">
                <span>Open Extension</span>
                <kbd>Alt+Shift+O</kbd>
            </div>
            <div class="s-item">
                <span>Group Selected Tabs</span>
                <kbd>Alt+Shift+G</kbd>
            </div>
            <div class="s-item">
                <span>Save Current Window</span>
                <kbd>Alt+Shift+S</kbd>
            </div>
            <div class="s-item">
                <span>Focus Search Field</span>
                <kbd>/</kbd>
            </div>
            <div class="s-item">
                <span>Focus Name Input</span>
                <kbd>Any Key</kbd>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="cuntin" style="margin-bottom: 8px;">
            <input type="text" id="groupName" class="cuntinput" placeholder="New group name..." />
            <button id="createGroup" class="actionBtn primaryBtn">Create</button>
        </div>
        <button id="saveBtn" class="actionBtn secondaryBtn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="margin-right: 6px;">
                <path d="M2 4a2 2 0 012-2h6l4 4v6a2 2 0 01-2 2H4a2 2 0 01-2-2V4z" stroke="currentColor" stroke-width="1.4"/>
                <path d="M10 2v3H5.5V2M5 10h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            Save Window
        </button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
